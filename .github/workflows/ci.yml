name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Run core unit tests
        run: pnpm test

      - name: Run wrapper / CLI / entitlements tests
        run: pnpm test:packages

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter playground exec playwright install --with-deps chromium firefox webkit

      - name: Run e2e tests
        run: pnpm --filter playground test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/playground/playwright-report/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core package
        run: pnpm build

      - name: Verify dist outputs exist
        run: |
          test -f packages/core/dist/esm/index.js
          test -f packages/core/dist/open-editor.esm.min.js
          test -f packages/core/dist/open-editor.min.cjs
          test -f packages/core/dist/open-editor.umd.min.js
          test -f packages/core/dist/open-editor.css
          test -f packages/core/index.d.ts
          # minified-only distribution: no sourcemaps may ship (2026-07-14 posture)
          test -z "$(find packages/core/dist -name '*.map' -print -quit)"

      - name: Bundle size gate (17.7)
        run: node packages/core/scripts/check-size.mjs
